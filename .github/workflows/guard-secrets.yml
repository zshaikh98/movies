name: Guard secrets

# Backstop for .gitignore: fails the build if any .env file is ever committed.
# Deterministic, no false positives — .env.example is explicitly allowed.

on:
  push:
  pull_request:

jobs:
  no-committed-env:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure no .env files are tracked
        run: |
          set -euo pipefail
          tracked="$(git ls-files \
            | grep -E '(^|/)\.env(\..*)?$' \
            | grep -vE '(^|/)\.env\.example$' || true)"
          if [ -n "${tracked}" ]; then
            echo "::error::Secret file(s) committed to git:"
            echo "${tracked}"
            echo "Remove them from version control, rotate the credentials, and rely on .gitignore."
            echo "See SECURITY.md."
            exit 1
          fi
          echo "OK: no .env files are tracked."
